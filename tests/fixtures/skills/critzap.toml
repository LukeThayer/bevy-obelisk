id = "critzap"
name = "Crit Zap"
tags = ["spell", "fire"]
targeting = "single_enemy"
delivery = "projectile"
mana_cost = 5.0

# On a critical strike, additionally CAST static_discharge as a real secondary skill
# (additional = true => the primary critzap hit still lands; the trigger fires on top).
[[conditions]]
trigger_skill = "static_discharge"
type = "on_crit"
additional = true

[damage]
base_damages = [{ type = "fire", min = 20.0, max = 20.0 }]
