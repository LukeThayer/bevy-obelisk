id = "fireball"
name = "Fireball"
tags = ["spell", "fire"]
targeting = "single_enemy"
delivery = "projectile"
mana_cost = 5.0

# Task 13 canonical fireball/fireball_explosion pair (carried Task 9 dependency): a chargeable
# ballistic bolt whose hit-phase Always condition (fires on ANY confirmed hit, Task 7) AND
# lifecycle OnImpact/OnExpire conditions (fire on a HitWorld/Fuse ending, Task 8) all trigger
# fireball_explosion's OWN timeline. `additional = true` is the v1-required form for a
# timeline-target condition (see src/combat/system.rs::is_invalid_timeline_target /
# is_invalid_lifecycle_target) -- without it the condition would be flagged invalid.
#
# Only one of the three ever fires for a given ending: HitEntity -> Always (on_hit_confirmed);
# HitWorld -> OnImpact; Fuse -> OnExpire (end_hitboxes). See scenario/library.rs's
# triggered_hit_explosion / triggered_world_impact / triggered_fuse_expiry.
[[conditions]]
trigger_skill = "fireball_explosion"
type = "always"
additional = true

[[conditions]]
trigger_skill = "fireball_explosion"
type = "on_impact"
additional = true

[[conditions]]
trigger_skill = "fireball_explosion"
type = "on_expire"
additional = true

[damage]
base_damages = [{ type = "fire", min = 20.0, max = 20.0 }]
